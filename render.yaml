services:
  - type: web
    name: idea-reality-check
    runtime: python
    buildCommand: pip install -e . && pip install -r api/requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: ANTHROPIC_API_KEY
        sync: false   # set manually in Render dashboard
      - key: LEMONSQUEEZY_API_KEY
        sync: false   # set manually in Render dashboard
      - key: LEMONSQUEEZY_WEBHOOK_SECRET
        sync: false   # set manually in Render dashboard
      - key: TURSO_DATABASE_URL
        sync: false   # set manually in Render dashboard
      - key: TURSO_AUTH_TOKEN
        sync: false   # set manually in Render dashboard
      - key: OPENAI_API_KEY
        sync: false   # set manually in Render dashboard — enables semantic crowd search
                      # (unset -> crowd_intelligence gracefully falls back to keyword LIKE)
      - key: EMB_CACHE_TTL
        value: "600"  # seconds the in-memory embedding matrix is cached before reload
